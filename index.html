<!DOCTYPE html>
<html lang="zh-TW">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>PHP + MYSQL練習</title>
     <style>
          :root {
               --glass-bg: rgba(255, 255, 255, 0.08);
               --glass-border: rgba(255, 255, 255, 0.15);
               --accent-blue: #9cecfb;
               --pearl-shine: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0) 70%);
          }

          * {
               margin: 0;
               padding: 0;
               box-sizing: border-box;
               font-family: 'Inter', 'Noto Sans TC', sans-serif;
          }

          body {
               background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
               min-height: 100vh;
               display: flex;
               flex-direction: column;
               align-items: center;
               padding: 80px 20px;
               color: white;
               overflow-x: hidden;
          }

          .header {
               text-align: center;
               margin-bottom: 60px;
          }

          .header h1 {
               font-size: 2.2rem;
               font-weight: 200;
               letter-spacing: 8px;
               margin-bottom: 10px;
               background: linear-gradient(to right, #fff, var(--accent-blue));
               -webkit-background-clip: text;
               -webkit-text-fill-color: transparent;
          }

          .header p {
               font-size: 0.8rem;
               color: rgba(5, 181, 251, 0.4);
               letter-spacing: 4px;
          }

          .container {
               width: 100%;
               max-width: 800px;
               display: grid;
               gap: 20px;
          }

          /* 珍珠連結樣式 */
          .course-list {
               list-style: none;
               display: grid;
               gap: 15px;
          }

          .course-list a {
               display: flex;
               align-items: center;
               padding: 25px 35px;
               background: var(--glass-bg);
               background-image: var(--pearl-shine);
               backdrop-filter: blur(25px);
               -webkit-backdrop-filter: blur(25px);
               border: 1px solid var(--glass-border);
               border-radius: 25px;
               text-decoration: none;
               color: white;
               transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
               box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2), inset 1px 1px 2px rgba(255, 255, 255, 0.1);
          }

          .course-list a:hover {
               transform: translateY(-5px) scale(1.02);
               background-color: rgba(3, 250, 241, 0.982);
               border-color: var(--accent-blue);
               box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 0 15px rgba(156, 236, 251, 0.2);
          }

          .course-number {
               width: 35px;
               height: 35px;
               background: white;
               color: #0f172a;
               display: flex;
               align-items: center;
               justify-content: center;
               border-radius: 50%;
               margin-right: 25px;
               font-weight: 800;
               box-shadow: inset -2px -2px 5px rgba(0, 0, 0, 0.2), inset 2px 2px 5px rgba(255, 255, 255, 1);
          }

          .course-text {
               font-weight: 200;
               letter-spacing: 2px;
               font-size: 1.1rem;
          }

          /* 背景裝飾球體 */
          .bg-glow {
               position: fixed;
               width: 500px;
               height: 500px;
               background: radial-gradient(circle, rgba(156, 236, 251, 0.05) 0%, transparent 70%);
               top: -150px;
               right: -150px;
               z-index: -1;
          }
     </style>
</head>

<body>
     <div class="bg-glow"></div>
     <div class="header">
          <h1>PHP + MYSQL 學習</h1>
          <p class="subtitle">程式設計課程學習紀錄</p>
          <p class="date">2026 年 5 月 18 日</p>
     </div>

     <div class="container">
          <ul class="course-list">
               <li>
                    <a href="./01-pdo.php">
                         <span class="course-number">01</span>
                         PDO連線
                    </a>
               </li>

               <li>
                    <a href="./02-register.php">
                         <span class="course-number">02</span>
                         會員註冊
                    </a>
               </li>
               <li>
                    <a href="./03-login.php">
                         <span class="course-number">03</span>
                         會員登入
                    </a>
               </li>
               <li>
                    <a href="school/index.html">
                         <span class="course-number">04</span>
                         學生管理系統製作練習
                    </a>
               </li>


          </ul>
     </div>
</body>

</html>
